version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code-ide-backend
    ports:
      - "8000:8000"
    # If your backend requires environment variables (like API keys, DB urls), 
    # you can pass them here or create a .env file
    # environment:
    #   - DATABASE_URL=your_db_url
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: code-ide-frontend
    ports:
      - "3000:80" # Maps port 3000 on your local machine to port 80 in the container (nginx)
    depends_on:
      - backend
    restart: unless-stopped
